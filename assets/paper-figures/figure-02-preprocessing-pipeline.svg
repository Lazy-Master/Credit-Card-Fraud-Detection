        <svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
          <title>Figure 2. Data Preprocessing Pipeline</title>
          <desc>The paper stresses leakage-safe preprocessing with SMOTE applied only to training data.</desc>
          <rect width="1120" height="520" fill="#f7f8fc" rx="24"/>
          <text x="40" y="56" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Figure 2. Data Preprocessing Pipeline</text>
          <text x="40" y="84" fill="#5b6475" font-family="Arial, Helvetica, sans-serif" font-size="14">The paper stresses leakage-safe preprocessing with SMOTE applied only to training data.</text>
          <defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#77839a"/>
  </marker>
</defs>
<rect x="50" y="220" width="190" height="110" rx="18" fill="#4f7cff" fill-opacity="0.12" stroke="#4f7cff" stroke-width="3"/>
<text x="145.0" y="271.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Raw transactions</text>
<text x="145.0" y="297.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="15">284,807 rows, 30 features</text>
<line x1="240" y1="275" x2="270" y2="275" stroke="#77839a" stroke-width="3" marker-end="url(#arrowhead)"/><rect x="260" y="220" width="190" height="110" rx="18" fill="#21b6a8" fill-opacity="0.12" stroke="#21b6a8" stroke-width="3"/>
<text x="355.0" y="271.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Stratified split</text>
<text x="355.0" y="297.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="15">Train / test separation before balancing</text>
<line x1="450" y1="275" x2="480" y2="275" stroke="#77839a" stroke-width="3" marker-end="url(#arrowhead)"/><rect x="470" y="220" width="190" height="110" rx="18" fill="#ff9f43" fill-opacity="0.12" stroke="#ff9f43" stroke-width="3"/>
<text x="565.0" y="271.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">SMOTE on train only</text>
<text x="565.0" y="297.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="15">Prevent leakage into the test set</text>
<line x1="660" y1="275" x2="690" y2="275" stroke="#77839a" stroke-width="3" marker-end="url(#arrowhead)"/><rect x="680" y="220" width="190" height="110" rx="18" fill="#8b5cf6" fill-opacity="0.12" stroke="#8b5cf6" stroke-width="3"/>
<text x="775.0" y="271.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Scale Time and Amount</text>
<text x="775.0" y="297.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="15">RobustScaler / Standardized inputs</text>
<line x1="870" y1="275" x2="900" y2="275" stroke="#77839a" stroke-width="3" marker-end="url(#arrowhead)"/><rect x="890" y="220" width="190" height="110" rx="18" fill="#25a55b" fill-opacity="0.12" stroke="#25a55b" stroke-width="3"/>
<text x="985.0" y="271.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">Model-ready dataset</text>
<text x="985.0" y="297.0" text-anchor="middle" fill="#172033" font-family="Arial, Helvetica, sans-serif" font-size="15">Balanced training data, untouched test set</text>
<text x="560" y="160" text-anchor="middle" fill="#4a5568" font-family="Arial, Helvetica, sans-serif" font-size="18">Key preprocessing principle: split first, resample second.</text>
